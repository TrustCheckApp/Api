version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trustcheck
      POSTGRES_PASSWORD: trustcheck
      POSTGRES_DB: trustcheck_e2e
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustcheck -d trustcheck_e2e"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://trustcheck:trustcheck@postgres:5432/trustcheck_e2e
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: e2e-jwt-secret-not-for-prod
      JWT_REFRESH_SECRET: e2e-refresh-secret-not-for-prod
      JWT_EXPIRES_IN: 15m
      OTP_LENGTH: 6
      OTP_EXPIRATION_SECONDS: 300
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
