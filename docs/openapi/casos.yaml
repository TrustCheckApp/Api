openapi: 3.0.3
info:
  title: TrustCheck API - CASOS
  description: |
    Contrato do modulo CASOS alinhado aos endpoints implementados na Sprint 01.
    Pipeline oficial: ENVIADO -> EM_MODERACAO -> PUBLICADO -> AGUARDANDO_RESPOSTA_EMPRESA -> EM_NEGOCIACAO -> RESOLVIDO | NAO_RESOLVIDO.
  version: "1.1.0"
servers:
  - url: http://localhost:3000
  - url: https://api.trustcheck.com.br

security:
  - bearerAuth: []

tags:
  - name: cases
  - name: legal-audit

paths:
  /cases:
    post:
      tags: [cases]
      summary: Abrir novo caso
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenCaseRequest'
      responses:
        "201":
          description: Caso criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseCreatedResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

  /cases/{id}:
    get:
      tags: [cases]
      summary: Consultar caso por UUID ou publicId
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Caso encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        "404":
          $ref: '#/components/responses/NotFound'

  /cases/{id}/audit:
    get:
      tags: [legal-audit]
      summary: Consultar trilha auditavel do caso e aceite legal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Auditoria do caso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseAuditResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /cases/{id}/moderation/start:
    post:
      tags: [cases]
      summary: ENVIADO -> EM_MODERACAO
      parameters:
        - $ref: '#/components/parameters/CaseId'
      responses:
        "200": { $ref: '#/components/responses/TransitionOk' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { $ref: '#/components/responses/Conflict' }

  /cases/{id}/moderation/approve:
    post:
      tags: [cases]
      summary: EM_MODERACAO -> PUBLICADO
      parameters:
        - $ref: '#/components/parameters/CaseId'
      responses:
        "200": { $ref: '#/components/responses/TransitionOk' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { $ref: '#/components/responses/Conflict' }

  /cases/{id}/moderation/reject:
    post:
      tags: [cases]
      summary: EM_MODERACAO -> NAO_RESOLVIDO
      parameters:
        - $ref: '#/components/parameters/CaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectCaseRequest'
      responses:
        "200": { $ref: '#/components/responses/TransitionOk' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { $ref: '#/components/responses/Conflict' }

  /cases/{id}/notify-company:
    post:
      tags: [cases]
      summary: PUBLICADO -> AGUARDANDO_RESPOSTA_EMPRESA (assinatura interna)
      parameters:
        - $ref: '#/components/parameters/CaseId'
      responses:
        "200": { $ref: '#/components/responses/TransitionOk' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "409": { $ref: '#/components/responses/Conflict' }

  /cases/{id}/company/respond:
    post:
      tags: [cases]
      summary: AGUARDANDO_RESPOSTA_EMPRESA -> EM_NEGOCIACAO
      parameters:
        - $ref: '#/components/parameters/CaseId'
      responses:
        "200": { $ref: '#/components/responses/TransitionOk' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { $ref: '#/components/responses/Conflict' }

  /cases/{id}/resolve:
    post:
      tags: [cases]
      summary: EM_NEGOCIACAO -> RESOLVIDO
      parameters:
        - $ref: '#/components/parameters/CaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveCaseRequest'
      responses:
        "200": { $ref: '#/components/responses/TransitionOk' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { $ref: '#/components/responses/Conflict' }

  /cases/{id}/close-unresolved:
    post:
      tags: [cases]
      summary: EM_NEGOCIACAO -> NAO_RESOLVIDO
      parameters:
        - $ref: '#/components/parameters/CaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseUnresolvedRequest'
      responses:
        "200": { $ref: '#/components/responses/TransitionOk' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { $ref: '#/components/responses/Conflict' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CaseId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Nao autorizado
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    Forbidden:
      description: Sem permissao
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    NotFound:
      description: Recurso nao encontrado
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    Conflict:
      description: Violacao de regra de negocio/transicao
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    UnprocessableEntity:
      description: Validacao semantica invalida
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    TransitionOk:
      description: Transicao executada
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TransitionResponse'

  schemas:
    OpenCaseRequest:
      type: object
      required: [companyId, experienceType, category, description, occurredAt, legalAcceptance]
      properties:
        companyId: { type: string, format: uuid }
        experienceType: { type: string, enum: [reclamacao, denuncia, elogio, duvida_resolvida] }
        category: { type: string, enum: [imoveis, servicos, ecommerce, financeiro, saude, educacao, outro] }
        description: { type: string, minLength: 50, maxLength: 4000 }
        monetaryValue: { type: number }
        occurredAt: { type: string, format: date }
        legalAcceptance:
          type: object
          required: [termId, contentHashEcho]
          properties:
            termId: { type: string }
            contentHashEcho: { type: string }

    CaseCreatedResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        publicId: { type: string }
        status: { $ref: '#/components/schemas/CaseStatus' }

    CaseResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        publicId: { type: string }
        status: { $ref: '#/components/schemas/CaseStatus' }
        experienceType: { type: string }
        category: { type: string }
        description: { type: string }
        monetaryValue: { type: number, nullable: true }
        occurredAt: { type: string, format: date }
        submittedAt: { type: string, format: date-time }
        publishedAt: { type: string, format: date-time, nullable: true }

    CaseAuditResponse:
      type: object
      properties:
        case:
          type: object
          properties:
            id: { type: string, format: uuid }
            status: { $ref: '#/components/schemas/CaseStatus' }
        termAcceptance:
          type: object
          nullable: true
          properties:
            termVersion: { type: string }
            contentHash: { type: string }
            acceptedAt: { type: string, format: date-time }
            ip: { type: string }

    ResolveCaseRequest:
      type: object
      required: [consumerConfirmed, companyConfirmed]
      properties:
        consumerConfirmed: { type: boolean }
        companyConfirmed: { type: boolean }

    RejectCaseRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string }

    CloseUnresolvedRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string }

    TransitionResponse:
      type: object
      properties:
        caseId: { type: string, format: uuid }
        fromStatus: { $ref: '#/components/schemas/CaseStatus' }
        toStatus: { $ref: '#/components/schemas/CaseStatus' }
        transitionId: { type: string, format: uuid }

    CaseStatus:
      type: string
      enum: [ENVIADO, EM_MODERACAO, PUBLICADO, AGUARDANDO_RESPOSTA_EMPRESA, EM_NEGOCIACAO, RESOLVIDO, NAO_RESOLVIDO]

    ErrorResponse:
      type: object
      properties:
        statusCode: { type: integer }
        message: {}
        error: { type: string }
