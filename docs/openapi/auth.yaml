openapi: 3.0.3
info:
  title: TrustCheck API - AUTH
  description: |
    Contrato do modulo AUTH alinhado aos endpoints implementados na Sprint 01.
    Escopo: cadastro consumidor/empresa, confirmacao OTP, SSO e claim empresarial.
  version: "1.1.0"
servers:
  - url: http://localhost:3000
  - url: https://api.trustcheck.com.br

tags:
  - name: auth-consumer
  - name: auth-company
  - name: auth-sso

paths:
  /auth/consumer/register:
    post:
      tags: [auth-consumer]
      summary: Inicia cadastro de consumidor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterConsumerRequest'
      responses:
        "201":
          description: Usuario criado em pending_otp com registrationToken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterInitResponse'
        "409":
          $ref: '#/components/responses/Conflict'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/consumer/register/confirm:
    post:
      tags: [auth-consumer]
      summary: Confirma cadastro do consumidor com OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterConfirmRequest'
      responses:
        "200":
          description: Conta ativada e tokens emitidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /auth/company/register:
    post:
      tags: [auth-company]
      summary: Inicia cadastro empresarial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCompanyRequest'
      responses:
        "201":
          description: Usuario/empresa criados e OTP enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterInitResponse'
        "409":
          $ref: '#/components/responses/Conflict'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/company/register/confirm:
    post:
      tags: [auth-company]
      summary: Confirma OTP e inicia enrolamento TOTP da empresa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterConfirmRequest'
      responses:
        "200":
          description: Token temporario + segredo/QR/recovery codes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyConfirmResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /auth/company/claim:
    post:
      tags: [auth-company]
      summary: Reivindica perfil empresarial por CNPJ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimCompanyRequest'
      responses:
        "202":
          description: Claim registrado para analise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimCreatedResponse'
        "409":
          $ref: '#/components/responses/Conflict'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/company/claim/{claimId}/status:
    get:
      tags: [auth-company]
      summary: Consulta status do claim (requer autenticacao)
      parameters:
        - in: path
          name: claimId
          required: true
          schema:
            type: string
            format: uuid
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Status atual do claim
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimStatusResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /auth/sso/google:
    post:
      tags: [auth-sso]
      summary: Login/cadastro via token Google
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoAuthRequest'
      responses:
        "200":
          description: Tokens emitidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/sso/apple:
    post:
      tags: [auth-sso]
      summary: Login/cadastro via token Apple
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoAuthRequest'
      responses:
        "200":
          description: Tokens emitidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Requisicao invalida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Nao autorizado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflito de regra de negocio
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Validacao semantica invalida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso nao encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RegisterConsumerRequest:
      type: object
      required: [email, password, fullName, lgpdAccepted, lgpdVersion]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 10 }
        fullName: { type: string }
        phone: { type: string }
        lgpdAccepted: { type: boolean }
        lgpdVersion: { type: string }

    RegisterCompanyRequest:
      type: object
      required: [email, password, cnpj, legalName, fullName, lgpdAccepted, lgpdVersion]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 10 }
        cnpj: { type: string }
        legalName: { type: string }
        tradeName: { type: string }
        fullName: { type: string }
        phone: { type: string }
        lgpdAccepted: { type: boolean }
        lgpdVersion: { type: string }

    RegisterConfirmRequest:
      type: object
      required: [registrationToken, otp]
      properties:
        registrationToken: { type: string }
        otp:
          type: string
          pattern: '^\\d{6}$'

    ClaimCompanyRequest:
      type: object
      required: [cnpj, legalName, email, password, fullName, documents, lgpdAccepted, lgpdVersion]
      properties:
        cnpj: { type: string }
        legalName: { type: string }
        tradeName: { type: string }
        email: { type: string, format: email }
        password: { type: string, minLength: 10 }
        fullName: { type: string }
        phone: { type: string }
        documents:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ClaimDocument'
        lgpdAccepted: { type: boolean }
        lgpdVersion: { type: string }

    ClaimDocument:
      type: object
      required: [url, fileName, mimeType, sizeBytes]
      properties:
        url: { type: string, format: uri }
        fileName: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer, minimum: 1 }

    SsoAuthRequest:
      type: object
      required: [idToken, lgpdAccepted, lgpdVersion]
      properties:
        idToken: { type: string }
        lgpdAccepted: { type: boolean }
        lgpdVersion: { type: string }

    RegisterInitResponse:
      type: object
      properties:
        userId: { type: string, format: uuid }
        registrationToken: { type: string }

    ClaimCreatedResponse:
      type: object
      properties:
        claimId: { type: string, format: uuid }
        registrationToken: { type: string }

    ClaimStatusResponse:
      type: object
      properties:
        claimId: { type: string, format: uuid }
        status: { type: string, enum: [pending_review, approved, rejected] }
        submittedAt: { type: string, format: date-time }
        reviewedAt: { type: string, format: date-time, nullable: true }
        rejectionReason: { type: string, nullable: true }

    TokensResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }

    CompanyConfirmResponse:
      type: object
      properties:
        accessToken: { type: string, description: token temporario totp_pending }
        totpSecret: { type: string }
        qrCodeDataUrl: { type: string }
        recoveryCodes:
          type: array
          items: { type: string }

    ErrorResponse:
      type: object
      properties:
        statusCode: { type: integer }
        message: {}
        error: { type: string }
