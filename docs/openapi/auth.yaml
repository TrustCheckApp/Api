openapi: 3.0.3
info:
  title: TrustCheck API - AUTH
  description: |
    Contrato do módulo AUTH alinhado aos controllers implementados na Sprint 01.
    Este arquivo cobre cadastro consumidor/empresa, confirmação OTP, SSO, claim empresarial e revisão administrativa de claim.

    Regras de segurança/LGPD:
    - Exemplos não devem conter OTP, access token, refresh token, TOTP secret, recovery code ou secret real.
    - Campos sensíveis retornados em fluxo one-shot são marcados com `x-sensitive: true`.
    - Logs e auditoria devem usar payload sanitizado.
  version: "1.1.2"
servers:
  - url: http://localhost:3000
  - url: https://api.trustcheck.com.br

tags:
  - name: auth-consumer
  - name: auth-company
  - name: auth-sso

paths:
  /auth/company/register:
    post:
      tags: [auth-company]
      summary: Inicia cadastro empresarial
      operationId: registerCompany
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCompanyRequest'
      responses:
        "201":
          description: Cadastro iniciado e OTP enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterInitResponse'
        "409":
          $ref: '#/components/responses/Conflict'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
  /auth/company/register/confirm:
    post:
      tags: [auth-company]
      summary: Confirma OTP e inicia enrolamento TOTP da empresa
      description: |
        Endpoint de resposta one-shot. Retorna token temporário para etapa `totp_pending` e material de enrolamento TOTP.
        Os campos `totpSecret`, `qrCodeDataUrl` e `recoveryCodes` são sensíveis, não devem ser logados e não possuem exemplos.
      operationId: confirmCompanyRegistration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterConfirmRequest'
      responses:
        "200":
          description: OTP válido e enrolamento TOTP iniciado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyConfirmResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
  /auth/company/claim:
    post:
      tags: [auth-company]
      summary: Reivindica perfil empresarial por CNPJ
      operationId: claimCompanyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimCompanyRequest'
      responses:
        "202":
          description: Claim registrado para análise e OTP enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimCreatedResponse'
        "409":
          $ref: '#/components/responses/Conflict'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
  /auth/company/claim/{claimId}/approve:
    post:
      tags: [auth-company]
      summary: Aprova reivindicação empresarial
      operationId: approveCompanyClaim
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClaimId'
      responses:
        "200":
          description: Claim aprovado e trilha auditável registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimReviewResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'
  /auth/company/claim/{claimId}/reject:
    post:
      tags: [auth-company]
      summary: Rejeita reivindicação empresarial
      operationId: rejectCompanyClaim
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClaimId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectCompanyClaimRequest'
      responses:
        "200":
          description: Claim rejeitado e trilha auditável registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimReviewResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
  /auth/company/claim/{claimId}/status:
    get:
      tags: [auth-company]
      summary: Consulta status da reivindicação empresarial
      operationId: getCompanyClaimStatus
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClaimId'
      responses:
        "200":
          description: Status atual do claim retornado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimStatusResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ClaimId:
      in: path
      name: claimId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Não autenticado ou token inválido
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Sem permissão para executar a ação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflito de regra de negócio
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Validação semântica inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    RegisterCompanyRequest:
      type: object
      required: [email, password, cnpj, legalName, fullName, lgpdAccepted, lgpdVersion]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 10
          writeOnly: true
        cnpj:
          type: string
        legalName:
          type: string
        tradeName:
          type: string
        fullName:
          type: string
        phone:
          type: string
        lgpdAccepted:
          type: boolean
        lgpdVersion:
          type: string
    RegisterConfirmRequest:
      type: object
      required: [registrationToken, otp]
      properties:
        registrationToken:
          type: string
          writeOnly: true
          x-sensitive: true
        otp:
          type: string
          pattern: '^\\d{6}$'
          writeOnly: true
          x-sensitive: true
    ClaimCompanyRequest:
      type: object
      required: [cnpj, legalName, email, password, fullName, documents, lgpdAccepted, lgpdVersion]
      properties:
        cnpj:
          type: string
        legalName:
          type: string
        tradeName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 10
          writeOnly: true
        fullName:
          type: string
        phone:
          type: string
        documents:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ClaimDocument'
        lgpdAccepted:
          type: boolean
        lgpdVersion:
          type: string
    ClaimDocument:
      type: object
      required: [url, fileName, mimeType, sizeBytes]
      properties:
        url:
          type: string
          format: uri
        fileName:
          type: string
        mimeType:
          type: string
        sizeBytes:
          type: integer
          minimum: 1
    RegisterInitResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        registrationToken:
          type: string
          x-sensitive: true
    ClaimCreatedResponse:
      type: object
      properties:
        claimId:
          type: string
          format: uuid
        registrationToken:
          type: string
          x-sensitive: true
    ClaimStatusResponse:
      type: object
      properties:
        claimId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending_review, approved, rejected]
        submittedAt:
          type: string
          format: date-time
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        rejectionReason:
          type: string
          nullable: true
    RejectCompanyClaimRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 3
          maxLength: 500
    ClaimReviewResponse:
      type: object
      properties:
        claimId:
          type: string
          format: uuid
        status:
          type: string
          enum: [approved, rejected]
        reviewedAt:
          type: string
          format: date-time
        rejectionReason:
          type: string
          nullable: true
    CompanyConfirmResponse:
      type: object
      description: Resposta one-shot para configuração obrigatória de 2FA empresarial.
      properties:
        accessToken:
          type: string
          x-sensitive: true
        totpSecret:
          type: string
          x-sensitive: true
        qrCodeDataUrl:
          type: string
          x-sensitive: true
        recoveryCodes:
          type: array
          x-sensitive: true
          items:
            type: string
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        message: {}
        error:
          type: string
        code:
          type: string
