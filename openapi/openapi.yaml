openapi: 3.0.3
info:
  title: TrustCheck API - Sprint 1
  description: |
    Bundle OpenAPI consolidado para AUTH e CASOS na Sprint 01.

    Fonte funcional: controllers NestJS implementados em `src/modules/auth` e `src/modules/cases`.
    Fonte de produto: contratos Sprint 1 AUTH/CASOS.

    Regras de segurança/LGPD:
    - Não usar exemplos com OTP, tokens, TOTP secret, recovery codes, secrets ou dados reais.
    - Campos sensíveis são marcados com `x-sensitive: true`.
    - Payloads de auditoria e timeline devem expor somente dados autorizados e minimizados.
  version: "1.1.1"
servers:
  - url: http://localhost:3000
  - url: https://api.trustcheck.com.br

tags:
  - name: auth-consumer
  - name: auth-company
  - name: auth-sso
  - name: cases
  - name: legal-audit

paths:
  /auth/consumer/register:
    post:
      tags: [auth-consumer]
      summary: Inicia cadastro de consumidor
      operationId: registerConsumer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterConsumerRequest'
      responses:
        "201":
          description: Cadastro iniciado e OTP enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterInitResponse'
        "409": { $ref: '#/components/responses/Conflict' }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }
  /auth/consumer/register/confirm:
    post:
      tags: [auth-consumer]
      summary: Confirma cadastro do consumidor com OTP
      operationId: confirmConsumerRegistration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterConfirmRequest'
      responses:
        "200":
          description: Conta ativada e tokens emitidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponse'
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /auth/company/register:
    post:
      tags: [auth-company]
      summary: Inicia cadastro empresarial
      operationId: registerCompany
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCompanyRequest'
      responses:
        "201":
          description: Cadastro iniciado e OTP enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterInitResponse'
        "409": { $ref: '#/components/responses/Conflict' }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }
  /auth/company/register/confirm:
    post:
      tags: [auth-company]
      summary: Confirma OTP e inicia enrolamento TOTP da empresa
      description: |
        Resposta one-shot com token temporário de escopo `totp_pending` e material de enrolamento 2FA.
        Não logar nem exemplificar `totpSecret`, `qrCodeDataUrl` ou `recoveryCodes` com valores reais.
      operationId: confirmCompanyRegistration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterConfirmRequest'
      responses:
        "200":
          description: OTP válido e enrolamento TOTP iniciado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyConfirmResponse'
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
  /auth/company/claim:
    post:
      tags: [auth-company]
      summary: Reivindica perfil empresarial por CNPJ
      operationId: claimCompanyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimCompanyRequest'
      responses:
        "202":
          description: Claim registrado para análise e OTP enviado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimCreatedResponse'
        "409": { $ref: '#/components/responses/Conflict' }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }
  /auth/company/claim/{claimId}/status:
    get:
      tags: [auth-company]
      summary: Consulta status da reivindicação empresarial
      operationId: getCompanyClaimStatus
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: claimId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Status atual do claim retornado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimStatusResponse'
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
  /auth/sso/google:
    post:
      tags: [auth-sso]
      summary: Login ou cadastro via token Google
      operationId: ssoGoogle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoAuthRequest'
      responses:
        "200":
          description: Autenticado via Google e tokens emitidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponse'
        "400": { $ref: '#/components/responses/BadRequest' }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }
  /auth/sso/apple:
    post:
      tags: [auth-sso]
      summary: Login ou cadastro via token Apple
      operationId: ssoApple
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SsoAuthRequest'
      responses:
        "200":
          description: Autenticado via Apple e tokens emitidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokensResponse'
        "400": { $ref: '#/components/responses/BadRequest' }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }
  /cases:
    post:
      tags: [cases]
      summary: Abre novo caso
      operationId: openCase
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenCaseRequest'
      responses:
        "201":
          description: Caso criado com publicId gerado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseCreatedResponse'
        "401": { $ref: '#/components/responses/Unauthorized' }
        "404": { $ref: '#/components/responses/NotFound' }
        "422": { $ref: '#/components/responses/UnprocessableEntity' }
  /cases/{id}:
    get:
      tags: [cases]
      summary: Consulta caso por UUID interno ou publicId
      operationId: getCase
      parameters:
        - $ref: '#/components/parameters/CaseId'
      responses:
        "200":
          description: Dados públicos/minimizados do caso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        "404": { $ref: '#/components/responses/NotFound' }
  /cases/{id}/audit:
    get:
      tags: [legal-audit]
      summary: Consulta trilha auditável do caso e aceite legal
      operationId: getCaseAudit
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CaseId'
      responses:
        "200":
          description: Auditoria autorizada do caso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseAuditResponse'
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "404": { $ref: '#/components/responses/NotFound' }
  /cases/{id}/moderation/start:
    post:
      tags: [cases]
      summary: ENVIADO -> EM_MODERACAO
      operationId: startModeration
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CaseId'
      responses:
        "200": { $ref: '#/components/responses/TransitionOk' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { $ref: '#/components/responses/Conflict' }
  /cases/{id}/moderation/approve:
    post:
      tags: [cases]
      summary: EM_MODERACAO -> PUBLICADO
      operationId: approveModeration
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CaseId'
      responses:
        "200": { $ref: '#/components/responses/TransitionOk' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { $ref: '#/components/responses/Conflict' }
  /cases/{id}/moderation/reject:
    post:
      tags: [cases]
      summary: EM_MODERACAO -> NAO_RESOLVIDO
      operationId: rejectModeration
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectCaseRequest'
      responses:
        "200": { $ref: '#/components/responses/TransitionOk' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { $ref: '#/components/responses/Conflict' }
  /cases/{id}/notify-company:
    post:
      tags: [cases]
      summary: PUBLICADO -> AGUARDANDO_RESPOSTA_EMPRESA
      description: Endpoint interno protegido por assinatura HMAC no header `X-Internal-Signature`.
      operationId: notifyCompany
      parameters:
        - $ref: '#/components/parameters/CaseId'
        - in: header
          name: X-Internal-Signature
          required: true
          schema:
            type: string
          description: Assinatura HMAC-SHA256 do body com segredo interno.
      responses:
        "200": { $ref: '#/components/responses/TransitionOk' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "409": { $ref: '#/components/responses/Conflict' }
  /cases/{id}/company/respond:
    post:
      tags: [cases]
      summary: AGUARDANDO_RESPOSTA_EMPRESA -> EM_NEGOCIACAO
      operationId: companyRespond
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CaseId'
      responses:
        "200": { $ref: '#/components/responses/TransitionOk' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { $ref: '#/components/responses/Conflict' }
  /cases/{id}/resolve:
    post:
      tags: [cases]
      summary: EM_NEGOCIACAO -> RESOLVIDO
      description: Exige confirmação de consumidor e empresa.
      operationId: resolveCase
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveCaseRequest'
      responses:
        "200": { $ref: '#/components/responses/TransitionOk' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { $ref: '#/components/responses/Conflict' }
  /cases/{id}/close-unresolved:
    post:
      tags: [cases]
      summary: EM_NEGOCIACAO ou AGUARDANDO_RESPOSTA_EMPRESA -> NAO_RESOLVIDO
      operationId: closeUnresolvedCase
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseUnresolvedRequest'
      responses:
        "200": { $ref: '#/components/responses/TransitionOk' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "409": { $ref: '#/components/responses/Conflict' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CaseId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: UUID interno do caso ou publicId operacional.
  responses:
    BadRequest:
      description: Requisição inválida
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    Unauthorized:
      description: Não autenticado ou token inválido
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    Forbidden:
      description: Sem permissão
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    NotFound:
      description: Recurso não encontrado
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    Conflict:
      description: Conflito de regra de negócio ou transição inválida
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    UnprocessableEntity:
      description: Validação semântica inválida
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } } }
    TransitionOk:
      description: Transição executada com timeline/auditoria
      content: { application/json: { schema: { $ref: '#/components/schemas/TransitionResponse' } } }
  schemas:
    RegisterConsumerRequest:
      type: object
      required: [email, password, fullName, lgpdAccepted, lgpdVersion]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 10, writeOnly: true }
        fullName: { type: string }
        phone: { type: string }
        lgpdAccepted: { type: boolean }
        lgpdVersion: { type: string }
    RegisterCompanyRequest:
      type: object
      required: [email, password, cnpj, legalName, fullName, lgpdAccepted, lgpdVersion]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 10, writeOnly: true }
        cnpj: { type: string }
        legalName: { type: string }
        tradeName: { type: string }
        fullName: { type: string }
        phone: { type: string }
        lgpdAccepted: { type: boolean }
        lgpdVersion: { type: string }
    RegisterConfirmRequest:
      type: object
      required: [registrationToken, otp]
      properties:
        registrationToken: { type: string, writeOnly: true, x-sensitive: true }
        otp: { type: string, pattern: '^\\d{6}$', writeOnly: true, x-sensitive: true }
    ClaimCompanyRequest:
      type: object
      required: [cnpj, legalName, email, password, fullName, documents, lgpdAccepted, lgpdVersion]
      properties:
        cnpj: { type: string }
        legalName: { type: string }
        tradeName: { type: string }
        email: { type: string, format: email }
        password: { type: string, minLength: 10, writeOnly: true }
        fullName: { type: string }
        phone: { type: string }
        documents:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/ClaimDocument' }
        lgpdAccepted: { type: boolean }
        lgpdVersion: { type: string }
    ClaimDocument:
      type: object
      required: [url, fileName, mimeType, sizeBytes]
      properties:
        url: { type: string, format: uri }
        fileName: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer, minimum: 1 }
    SsoAuthRequest:
      type: object
      required: [idToken, lgpdAccepted, lgpdVersion]
      properties:
        idToken: { type: string, writeOnly: true, x-sensitive: true }
        lgpdAccepted: { type: boolean }
        lgpdVersion: { type: string }
    RegisterInitResponse:
      type: object
      properties:
        userId: { type: string, format: uuid }
        registrationToken:
          type: string
          x-sensitive: true
          description: Token temporário. Não logar nem exemplificar com valor real.
    ClaimCreatedResponse:
      type: object
      properties:
        claimId: { type: string, format: uuid }
        registrationToken:
          type: string
          x-sensitive: true
          description: Token temporário. Não logar nem exemplificar com valor real.
    ClaimStatusResponse:
      type: object
      properties:
        claimId: { type: string, format: uuid }
        status: { type: string, enum: [pending_review, approved, rejected] }
        submittedAt: { type: string, format: date-time }
        reviewedAt: { type: string, format: date-time, nullable: true }
        rejectionReason: { type: string, nullable: true }
    TokensResponse:
      type: object
      properties:
        accessToken: { type: string, x-sensitive: true }
        refreshToken: { type: string, x-sensitive: true }
    CompanyConfirmResponse:
      type: object
      description: Resposta one-shot para configuração obrigatória de 2FA empresarial.
      properties:
        accessToken: { type: string, description: Token temporário com escopo `totp_pending`., x-sensitive: true }
        totpSecret: { type: string, description: Segredo TOTP one-shot. Não logar nem exemplificar., x-sensitive: true }
        qrCodeDataUrl: { type: string, description: QR Code TOTP em data URL. Conteúdo sensível one-shot., x-sensitive: true }
        recoveryCodes:
          type: array
          description: Códigos de recuperação one-shot. Não logar nem exemplificar.
          x-sensitive: true
          items: { type: string }
    OpenCaseRequest:
      type: object
      required: [companyId, experienceType, category, description, occurredAt, legalAcceptance]
      properties:
        companyId: { type: string, format: uuid }
        experienceType: { type: string, enum: [reclamacao, denuncia, elogio, duvida_resolvida] }
        category: { type: string, enum: [imoveis, servicos, ecommerce, financeiro, saude, educacao, outro] }
        description: { type: string, minLength: 50, maxLength: 4000 }
        monetaryValue: { type: number, nullable: true }
        occurredAt: { type: string, format: date }
        questionnaireAnswers: { type: object, additionalProperties: true }
        legalAcceptance:
          type: object
          required: [termId, contentHashEcho]
          properties:
            termId: { type: string }
            contentHashEcho: { type: string }
    CaseCreatedResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        publicId: { type: string }
        status: { $ref: '#/components/schemas/CaseStatus' }
    CaseResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        publicId: { type: string }
        status: { $ref: '#/components/schemas/CaseStatus' }
        experienceType: { type: string }
        category: { type: string }
        description: { type: string }
        monetaryValue: { type: number, nullable: true }
        occurredAt: { type: string, format: date }
        submittedAt: { type: string, format: date-time }
        publishedAt: { type: string, format: date-time, nullable: true }
    CaseAuditResponse:
      type: object
      properties:
        case:
          type: object
          properties:
            id: { type: string, format: uuid }
            status: { $ref: '#/components/schemas/CaseStatus' }
        termAcceptance:
          type: object
          nullable: true
          properties:
            termVersion: { type: string }
            contentHash: { type: string }
            acceptedAt: { type: string, format: date-time }
            ip: { type: string }
    ResolveCaseRequest:
      type: object
      required: [consumerConfirmed, companyConfirmed]
      properties:
        consumerConfirmed: { type: boolean }
        companyConfirmed: { type: boolean }
    RejectCaseRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 3 }
    CloseUnresolvedRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 3 }
    TransitionResponse:
      type: object
      properties:
        caseId: { type: string, format: uuid }
        fromStatus: { $ref: '#/components/schemas/CaseStatus' }
        toStatus: { $ref: '#/components/schemas/CaseStatus' }
        transitionId: { type: string, format: uuid }
    CaseStatus:
      type: string
      enum: [ENVIADO, EM_MODERACAO, PUBLICADO, AGUARDANDO_RESPOSTA_EMPRESA, EM_NEGOCIACAO, RESOLVIDO, NAO_RESOLVIDO]
    ErrorResponse:
      type: object
      properties:
        statusCode: { type: integer }
        message: {}
        error: { type: string }
        code: { type: string }
